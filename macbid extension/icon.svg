<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <radialGradient id="goldGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#92400E"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Subtle accent sparkles -->
  <circle cx="422" cy="74" r="3.5" fill="#A5B4FC" opacity="0.55"/>
  <circle cx="84" cy="128" r="2.5" fill="#C4B5FD" opacity="0.45"/>
  <circle cx="462" cy="196" r="2" fill="#A5B4FC" opacity="0.4"/>
  <circle cx="68" cy="398" r="3" fill="#A5B4FC" opacity="0.35"/>

  <!-- Gavel: head + handle, rotated -45deg around (215, 238) -->
  <g transform="translate(215, 238) rotate(-45)" filter="url(#shadow)">
    <!-- Mallet head (wide cylinder) -->
    <rect x="-112" y="-38" width="224" height="76" rx="18" fill="url(#headGrad)"/>
    <!-- Center grip ring (darker band) -->
    <rect x="-22" y="-38" width="44" height="76" fill="#64748B"/>
    <!-- Top gloss on head -->
    <rect x="-112" y="-38" width="224" height="16" rx="18" fill="rgba(255,255,255,0.4)"/>
    <!-- Handle, extending from right end of head -->
    <rect x="82" y="6" width="44" height="162" rx="22" fill="url(#handleGrad)"/>
    <!-- Handle gloss -->
    <rect x="82" y="6" width="44" height="20" rx="22" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Sounding block (what gavel strikes) -->
  <rect x="74" y="406" width="200" height="24" rx="12" fill="rgba(255,255,255,0.18)"/>
  <rect x="74" y="406" width="200" height="8" rx="12" fill="rgba(255,255,255,0.12)"/>

  <!-- Price badge (bottom-right) -->
  <circle cx="370" cy="378" r="86" fill="url(#goldGrad)" filter="url(#badgeShadow)"/>
  <!-- Badge inner ring for depth -->
  <circle cx="370" cy="378" r="78" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <!-- Dollar sign -->
  <text x="370" y="378"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="98"
        font-weight="900"
        fill="#1E1B4B"
        text-anchor="middle"
        dominant-baseline="central">$</text>
</svg>
